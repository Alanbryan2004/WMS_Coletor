<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Separação - WMS Coletor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ... seu CSS existente ... */
    .toast {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 9999;
      animation: fadeOut 3s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <div class="row">
        <div>
          <label for="agenda">Agenda</label>
          <select id="agenda">
            <option value="">Selecionar</option>
            <option value="000010">000010</option>
          </select>
        </div>
        <div>
          <label for="ordem">Nº da OS</label>
          <input type="text" id="ordem" class="readonly" readonly>
        </div>
      </div>

      <label for="sugerido">Endereço Sugerido</label>
      <input type="text" id="sugerido" class="readonly" readonly>

      <label for="endereco">Lê Endereço</label>
      <input type="text" id="endereco" placeholder="Digite ou escaneie">

      <div class="row">
        <div>
          <label for="etiqueta">Lê Etiqueta</label>
          <input type="text" id="etiqueta" placeholder="Digite ou escaneie">
        </div>
        <div>
          <label for="etiquetaSugerida">Etiqueta Sugerida</label>
          <input type="text" id="etiquetaSugerida" class="readonly" readonly tabindex="-1">
        </div>
      </div>

      <label for="produto">Lê Produto</label>
      <input type="text" id="produto" placeholder="Digite ou escaneie">

      <div class="row">
        <div>
          <label for="qtdSeparada">Qtd. Separada</label>
          <input type="text" id="qtdSeparada" class="readonly" readonly value="0">
        </div>
        <div>
          <label for="qtdASeparar">Qtd. a Separar</label>
          <input type="text" id="qtdASeparar" class="readonly" readonly value="7">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="quantidade">Quantidade</label>
          <input type="text" id="quantidade" class="readonly" readonly>
        </div>
        <div>
          <label for="qtdLida">Qtd. Lida</label>
          <input type="text" id="qtdLida" class="readonly" readonly value="0">
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="confirmar" onclick="confirmar()">Confirmar</button>
      <button class="finalizar" onclick="finalizar()">Finalizar</button>
    </div>
  </div>

  <footer class="rodape">
    <div class="icones">
      <i class="fas fa-arrow-left" onclick="voltar()"></i>
      <i class="fas fa-home" onclick="irParaMenu()"></i>
      <i class="fas fa-sign-out-alt" onclick="logout()"></i>
    </div>
  </footer>

  <script>
    const agenda = document.getElementById("agenda");
    const ordem = document.getElementById("ordem");
    const sugerido = document.getElementById("sugerido");
    const etiquetaSugerida = document.getElementById("etiquetaSugerida");
    const qtdSeparada = document.getElementById("qtdSeparada");
    const qtdLida = document.getElementById("qtdLida");
    const qtdASeparar = document.getElementById("qtdASeparar");
    const endereco = document.getElementById("endereco");
    const etiqueta = document.getElementById("etiqueta");
    const produto = document.getElementById("produto");
    const quantidade = document.getElementById("quantidade");

    agenda.addEventListener("change", () => {
      if (agenda.value === "000010") {
        ordem.value = "000034";
        sugerido.value = "D01 C048 R91 P5 N0 A";
        etiquetaSugerida.value = "127";
        qtdSeparada.value = "0";
        qtdLida.value = "0";
        qtdASeparar.value = "7";
        endereco.focus();
      }
    });

    endereco.addEventListener("keydown", e => {
      if (e.key === "Enter") etiqueta.focus();
    });

    etiqueta.addEventListener("keydown", e => {
      if (e.key === "Enter") produto.focus();
    });

    produto.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        quantidade.value = "1";
        incluirProduto();
      }
    });

    function incluirProduto() {
      let qtd = parseInt(quantidade.value) || 0;
      let lida = parseInt(qtdLida.value) || 0;
      let separada = parseInt(qtdSeparada.value) || 0;

      qtdLida.value = lida + qtd;
      qtdSeparada.value = separada + qtd;

      showToast("Produto incluído!");
      limparCampos();
      endereco.focus();
    }

    function limparCampos() {
      endereco.value = "";
      etiqueta.value = "";
      produto.value = "";
      quantidade.value = "";
    }

    function showToast(msg) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => document.body.removeChild(toast), 3000);
    }

    function confirmar() {
      alert("Produto separado com sucesso!");
    }

    function finalizar() {
      alert("Separação finalizada com sucesso!");
    }

    function voltar() {
      window.history.back();
    }

    function irParaMenu() {
      window.location.href = "menu.html";
    }

    function logout() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
