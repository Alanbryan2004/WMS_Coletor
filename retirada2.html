<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirada - WMS Coletor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 1rem;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .row > .form-group {
      flex: 1;
      min-width: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      background-color: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: 14px;
      text-align: center;
    }

    th {
      background-color: #eee;
    }

    .acoes {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      gap: 0.5rem;
    }

    .acoes button {
      flex: 1;
      padding: 10px;
      font-weight: bold;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background-color: #c00000;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .acoes button:hover {
      background-color: #a00000;
    }

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
      }
      .acoes {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <h2>Retirada de Mercadorias</h2>

  <div class="form-group">
    <label for="agenda">Agenda</label>
    <select id="agenda">
      <option value="">Selecione a agenda</option>
      <!-- opções serão carregadas dinamicamente -->
    </select>
  </div>

  <div class="form-group">
    <label for="codigo">Lê Produto (Código de Barras)</label>
    <input type="text" id="codigo" placeholder="Escaneie o código de barras" onkeydown="if(event.key === 'Enter') adicionarProduto()">
  </div>

  <div class="form-group">
    <label for="descricao">Descrição do Produto</label>
    <input type="text" id="descricao" disabled>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="qtd">QTD</label>
      <input type="text" id="qtd" disabled>
    </div>
    <div class="form-group">
      <label for="nf">Nº NF</label>
      <input type="text" id="nf" disabled>
    </div>
    <div class="form-group">
      <label for="serie">Série</label>
      <input type="text" id="serie" disabled>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="qtdLida">QTD Lida</label>
      <input type="text" id="qtdLida" disabled>
    </div>
    <div class="form-group">
      <label for="qtdItens">QTD Itens</label>
      <input type="text" id="qtdItens" disabled>
    </div>
  </div>

  <table id="tabela">
    <thead>
      <tr>
        <th>CD_Produto</th>
        <th>Descrição Produto</th>
        <th>Qtd Item</th>
        <th>Qtd Lido</th>
      </tr>
    </thead>
    <tbody>
      <!-- Itens adicionados aqui -->
    </tbody>
  </table>

  <div class="acoes">
    <button onclick="limparCampos()">Limpar</button>
    <button onclick="zerarGrid()">Zerar</button>
    <button onclick="finalizarAgenda()">Finalizar</button>
    <button onclick="voltar()">Sair</button>
  </div>

  <script>
    let itensLidos = [];

    function adicionarProduto() {
      const codigo = document.getElementById("codigo").value.trim();
      if (!codigo) return;

      // Simular dados do produto
      const descricao = "Produto Exemplo";
      const qtd = 10;
      const nf = "123456";
      const serie = "1";
      const qtdLida = 1;

      // Preencher campos
      document.getElementById("descricao").value = descricao;
      document.getElementById("qtd").value = qtd;
      document.getElementById("nf").value = nf;
      document.getElementById("serie").value = serie;
      document.getElementById("qtdLida").value = qtdLida;
      document.getElementById("qtdItens").value = qtd;

      // Verificar se o produto já existe na grid
      const index = itensLidos.findIndex(p => p.codigo === codigo);
      if (index >= 0) {
        itensLidos[index].qtdLida += 1;
      } else {
        itensLidos.push({ codigo, descricao, qtdItem: qtd, qtdLida: 1 });
      }

      renderGrid();
      document.getElementById("codigo").value = "";
      document.getElementById("codigo").focus();
    }

    function renderGrid() {
      const tbody = document.querySelector("#tabela tbody");
      tbody.innerHTML = "";
      itensLidos.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.codigo}</td>
          <td>${item.descricao}</td>
          <td>${item.qtdItem}</td>
          <td>${item.qtdLida}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function limparCampos() {
      document.getElementById("codigo").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("qtd").value = "";
      document.getElementById("nf").value = "";
      document.getElementById("serie").value = "";
      document.getElementById("qtdLida").value = "";
      document.getElementById("qtdItens").value = "";
      document.getElementById("codigo").focus();
    }

    function zerarGrid() {
      itensLidos = [];
      renderGrid();
      limparCampos();
    }

    function finalizarAgenda() {
      alert("Agenda finalizada com sucesso!");
      // Aqui você pode fazer um POST ou redirecionamento
    }

    function voltar() {
      window.location.href = "https://wms-coletor2.vercel.app/packlist.html";
    }
  </script>

</body>
</html>
