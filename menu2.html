<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - WMS Coletor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .menu-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      width: 300px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h2>Menu Principal</h2>
    <button onclick="navegar('recebimento.html')">Recebimento</button>
    <button onclick="navegar('armazenamento.html')">Armazenamento</button>
    <button onclick="navegar('separacao.html')">Separação</button>
    <button onclick="navegar('conferencia_saida.html')">Conferência Saída</button>
    <button onclick="navegar('movimentacao.html')">Movimentação</button>
    <button onclick="window.location.href='inventario.html'">Inventário</button>
    <button onclick="window.location.href='packlist.html'">Packlist</button>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    function navegar(pagina) {
      window.location.href = pagina;
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
