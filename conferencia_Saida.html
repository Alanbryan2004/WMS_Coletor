<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- (mesmo cabeçalho, sem mudanças) -->
</head>
<body>
  <!-- (mesmo conteúdo do corpo até a tag <script>) -->
  <script>
    function voltar() {
      window.history.back();
    }

    function irParaMenu() {
      window.location.href = 'menu.html';
    }

    function logout() {
      window.location.href = 'index.html';
    }

    function confirmar() {
      alert("Função Confirmar executada.");
    }

    function finalizar() {
      document.getElementById("mensagem").style.display = "block";
    }

    document.getElementById('agendaSelect').addEventListener('change', function() {
      const agenda = this.value;
      const nf = document.getElementById('nf');
      const cliente = document.getElementById('cliente');
      const etiqueta = document.getElementById('etiqueta');
      const produto = document.getElementById('produto');
      const volume = document.getElementById('volume');
      const confirmarBtn = document.getElementById('btnConfirmar');
      const qtdItens = document.getElementById('qtdItens');
      const qtdVols = document.getElementById('qtdVols');

      if (agenda === '000001') {
        nf.value = '00075689';
        cliente.value = 'Mantran Tecnologias LTDA Me';

        etiqueta.disabled = false;
        produto.disabled = false;
        volume.disabled = false;
        confirmarBtn.disabled = false;

        etiqueta.focus();
      } else {
        nf.value = '';
        cliente.value = '';

        etiqueta.disabled = true;
        produto.disabled = true;
        volume.disabled = true;
        confirmarBtn.disabled = true;
      }
    });

    document.getElementById('volume').addEventListener('change', function() {
      const isChecked = this.checked;
      const qtdItens = document.getElementById('qtdItens');
      const qtdVols = document.getElementById('qtdVols');

      if (isChecked) {
        qtdItens.removeAttribute('readonly');
        qtdVols.removeAttribute('readonly');
        qtdItens.focus();
      } else {
        qtdItens.setAttribute('readonly', true);
        qtdVols.setAttribute('readonly', true);
        document.getElementById('produto').focus();
      }
    });
  </script>
</body>
</html>
