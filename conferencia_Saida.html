<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recebimento - WMS Coletor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    input, select { display: block; margin-bottom: 10px; padding: 8px; width: 100%; }
    .readonly { background-color: #eee; }
    .buttons button { padding: 10px; margin-right: 5px; }
  </style>
</head>
<body>
  <label for="agendaSelect">Agenda</label>
  <select id="agendaSelect">
    <option value="">Selecionar</option>
    <option value="000001">000001</option>
  </select>

  <label for="nf">Nº NF</label>
  <input type="text" id="nf" readonly />

  <label for="etiqueta">Lê Etiqueta</label>
  <input type="text" id="etiqueta" />

  <label>
    <input type="checkbox" id="volume" /> Volume Paletizado
  </label>

  <label for="produto">Lê Produto</label>
  <input type="text" id="produto" />

  <label for="qtdItens">Qtde Itens</label>
  <input type="text" id="qtdItens" readonly />

  <label for="qtdVols">Qtde Vols</label>
  <input type="text" id="qtdVols" readonly />

  <div class="buttons">
    <button onclick="confirmar()">Confirmar</button>
    <button onclick="finalizar()">Finalizar</button>
  </div>

  <script>
    const agendaSelect = document.getElementById('agendaSelect');
    const nfInput = document.getElementById('nf');
    const volumeCheckbox = document.getElementById('volume');

    const campoEtiqueta = document.getElementById('etiqueta');
    const campoProduto = document.getElementById('produto');
    const campoQtdItens = document.getElementById('qtdItens');
    const campoQtdVols = document.getElementById('qtdVols');

    // Função para ajustar tabIndex conforme a flag Volume Paletizado
    function atualizarTabIndex() {
      let index = 1;
      campoEtiqueta.tabIndex = index++;
      campoProduto.tabIndex = index++;

      if (volumeCheckbox.checked) {
        campoQtdItens.removeAttribute('readonly');
        campoQtdVols.removeAttribute('readonly');
        campoQtdItens.tabIndex = index++;
        campoQtdVols.tabIndex = index++;
      } else {
        campoQtdItens.setAttribute('readonly', true);
        campoQtdVols.setAttribute('readonly', true);
        campoQtdItens.tabIndex = -1;
        campoQtdVols.tabIndex = -1;
      }
    }

    // Atualiza tabIndex quando a flag muda
    volumeCheckbox.addEventListener('change', atualizarTabIndex);

    // Libera campos ao selecionar agenda válida
    agendaSelect.addEventListener('change', () => {
      if (agendaSelect.value === '000001') {
        nfInput.value = '00075689';
        campoEtiqueta.disabled = false;
        campoProduto.disabled = false;
        atualizarTabIndex();
      } else {
        nfInput.value = '';
        campoEtiqueta.disabled = true;
        campoProduto.disabled = true;
        campoQtdItens.disabled = true;
        campoQtdVols.disabled = true;
      }
    });

    function confirmar() {
      alert("Confirmado");
    }

    function finalizar() {
      alert("Finalizado");
    }
  </script>
</body>
</html>
