<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retirada - WMS Coletor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px 10px 80px; /* espaço para o rodapé */
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-weight: bold;
    }

    input, select, button {
      padding: 8px;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .botoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .botoes button {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      font-weight: bold;
      background-color: #c00000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .botoes button:hover {
      background-color: #a00000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #eee;
    }

    /* Rodapé fixo igual ao menu.html */
    .rodape {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      box-shadow: 0 -1px 4px rgba(0, 0, 0, 0.1);
      z-index: 999;
    }

    .rodape .icones {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .rodape .icones i {
      font-size: 22px;
      flex: 1;
      text-align: center;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease;
    }

    .rodape .icones i:hover {
      color: #0d6efd;
    }

    .rodape .icones i.ativo {
      color: #c00000;
    }
  </style>
</head>
<body>

  <h2>Retirada de Mercadorias</h2>
  <div class="container">
    <label for="agenda">Agenda:</label>
    <select id="agenda">
      <option value="">Selecione</option>
      <option value="manha">Manhã</option>
      <option value="tarde">Tarde</option>
    </select>

    <label for="leitura">Lê Produto:</label>
    <input type="text" id="leitura" placeholder="Escaneie o código de barras"/>

    <label>Produto:</label>
    <input type="text" id="produto" disabled/>

    <label>Descrição:</label>
    <input type="text" id="descricao" disabled/>

    <label>Endereço:</label>
    <input type="text" id="endereco" disabled/>

    <label>Qtd. Lida:</label>
    <input type="number" id="quantidade" value="1"/>

    <div class="botoes">
      <button onclick="limpar()">Limpar</button>
      <button onclick="zerar()">Zerar</button>
      <button onclick="finalizar()">Finalizar</button>
      <button onclick="voltar()">Sair</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Qtd</th>
        </tr>
      </thead>
      <tbody id="tabela">
        <!-- Linhas adicionadas via JS -->
      </tbody>
    </table>
  </div>

  <footer class="rodape">
    <div class="icones">
      <i class="fas fa-arrow-left" onclick="voltar()"></i>
      <i class="fas fa-home" id="homeIcon" onclick="irParaMenu()"></i>
      <i class="fas fa-sign-out-alt" onclick="logout()"></i>
    </div>
  </footer>

  <script>
    function limpar() {
      document.getElementById("leitura").value = "";
      document.getElementById("produto").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("endereco").value = "";
      document.getElementById("quantidade").value = "1";
    }

    function zerar() {
      document.getElementById("tabela").innerHTML = "";
    }

    function finalizar() {
      alert("Retirada finalizada!");
    }

    function voltar() {
      window.history.back();
    }

    function irParaMenu() {
      window.location.href = 'https://wms-coletor2.vercel.app/menu.html';
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = 'https://wms-coletor2.vercel.app/index.html';
    }

    if (window.location.pathname.includes("menu.html")) {
      const homeIcon = document.getElementById("homeIcon");
      if (homeIcon) homeIcon.classList.add("ativo");
    }

    // Exemplo simples de inclusão automática ao ler
    document.getElementById("leitura").addEventListener("input", function(e) {
      const codigo = e.target.value.trim();
      if (codigo.length >= 5) { // simula código válido
        document.getElementById("produto").value = codigo;
        document.getElementById("descricao").value = "Produto Teste";
        document.getElementById("endereco").value = "A01-01";
        const qtd = parseInt(document.getElementById("quantidade").value) || 1;

        const tabela = document.getElementById("tabela");
        const row = tabela.insertRow();
        row.innerHTML = `<td>${codigo}</td><td>Produto Teste</td><td>${qtd}</td>`;

        limpar();
      }
    });
  </script>

</body>
</html>
