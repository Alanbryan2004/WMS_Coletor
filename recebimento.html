<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recebimento - WMS Coletor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 10px 80px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
    }

    .form-group label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .form-group input {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px 5px;
      border: none;
      border-radius: 6px;
      background-color: #c00000;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #a00000;
    }

    .grid {
      width: 100%;
      max-width: 600px;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .grid th,
    .grid td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    .grid th {
      background-color: #c00000;
      color: white;
    }

    .rodape {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      box-shadow: 0 -1px 4px rgba(0, 0, 0, 0.1);
      z-index: 999;
    }

    .rodape .icones {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .rodape .icones i {
      font-size: 22px;
      flex: 1;
      text-align: center;
      cursor: pointer;
      color: #555;
      transition: color 0.3s ease;
    }

    .rodape .icones i:hover {
      color: #0d6efd;
    }

    .rodape .icones i.ativo {
      color: #c00000;
    }
  </style>
</head>
<body>
  <h1>Recebimento</h1>

  <div class="form-group">
    <label for="codigo">Ler Código de Barras:</label>
    <input type="text" id="codigo" oninput="lerProduto(event)" autofocus autocomplete="off" />
  </div>

  <table class="grid" id="tabela">
    <thead>
      <tr>
        <th>Produto</th>
        <th>Descrição</th>
        <th>Qtd</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button class="btn" onclick="finalizar()">Finalizar</button>

  <footer class="rodape">
    <div class="icones">
      <i class="fas fa-arrow-left" onclick="voltar()"></i>
      <i class="fas fa-home" id="homeIcon" onclick="irParaMenu()"></i>
      <i class="fas fa-sign-out-alt" onclick="logout()"></i>
    </div>
  </footer>

  <script>
    let produtos = [];

    function lerProduto(event) {
      const codigo = event.target.value.trim();
      if (codigo.length < 6) return;

      const existente = produtos.find(p => p.codigo === codigo);
      if (existente) {
        existente.qtd++;
      } else {
        produtos.push({ codigo, descricao: "Produto XYZ", qtd: 1 });
      }

      atualizarTabela();
      event.target.value = '';
    }

    function atualizarTabela() {
      const tbody = document.querySelector("#tabela tbody");
      tbody.innerHTML = '';
      produtos.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.codigo}</td>
          <td>${p.descricao}</td>
          <td>${p.qtd}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function finalizar() {
      alert("Recebimento finalizado com sucesso!");
      produtos = [];
      atualizarTabela();
    }

    function voltar() {
      window.history.back();
    }

    function irParaMenu() {
      window.location.href = 'https://wms-coletor2.vercel.app/menu.html';
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = 'https://wms-coletor2.vercel.app/index.html';
    }

    // Ativa ícone vermelho na tela correta
    if (window.location.pathname.includes("recebimento.html")) {
      const homeIcon = document.getElementById("homeIcon");
      if (homeIcon) homeIcon.classList.add("ativo");
    }
  </script>
</body>
</html>
